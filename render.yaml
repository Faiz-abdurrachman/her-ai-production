services:
  - type: web
    name: herai-signaling
    runtime: go
    plan: free
    buildCommand: mkdir -p public && cp -R index.html assets components css js pages public/ && node scripts/harden-public.mjs public && cd signaling && go build -tags netgo -ldflags "-s -w" -o app .
    startCommand: ./signaling/app
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: HERAI_STATIC_ROOT
        value: ./public
      - key: GAS_WEB_APP_URL
        value: https://script.google.com/macros/s/AKfycbz1tT_VoZQYrCxsBUD5v1HJjDNyM_p9TZnXw9t3uJlLmFLA7KGD4FzxPQ1I1a3w5tRE/exec
      - key: APP_ACCESS_PASSWORD
        sync: false
      - key: APP_ACCESS_PASSWORD_HASH
        sync: false
      - key: HERAI_ICE_SERVERS
        sync: false
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
  - type: web
    name: herai-messaging
    runtime: go
    plan: free
    buildCommand: cd messaging && go build -tags netgo -ldflags "-s -w" -o app .
    startCommand: ./messaging/app
    healthCheckPath: /healthz
    autoDeploy: true
    disks:
      - name: herai-messaging-data
        mountPath: /var/data
        sizeGB: 1
    envVars:
      - key: MESSAGING_DATA_FILE
        value: /var/data/herai-messaging-data.json
  - type: web
    name: herai-participant-portal
    runtime: go
    plan: free
    buildCommand: cd participant-portal && go build -tags netgo -ldflags "-s -w" -o app .
    startCommand: ./participant-portal/app
    healthCheckPath: /healthz
    autoDeploy: true
    disks:
      - name: herai-participant-portal-data
        mountPath: /var/data
        sizeGB: 1
    envVars:
      - key: PARTICIPANT_PORTAL_ADDR
        value: 0.0.0.0:10000
      - key: PARTICIPANT_PORTAL_SETTINGS_FILE
        value: /var/data/participant-portal-settings.json
      - key: PARTICIPANT_PORTAL_ADMIN_KEY
        sync: false

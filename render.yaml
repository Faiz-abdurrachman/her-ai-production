services:
  - type: web
    name: herai-superapp
    runtime: static
    buildCommand: mkdir -p public && cp -R index.html assets components css js pages public/
    staticPublishPath: ./public
    autoDeploy: true

  - type: web
    name: herai-signaling
    runtime: go
    rootDir: signaling
    plan: free
    buildCommand: go build -tags netgo -ldflags "-s -w" -o app .
    startCommand: ./app
    healthCheckPath: /healthz
    autoDeploy: true
